<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benessere Zen — Redesign</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #0A0A0A; font-family: 'Lato', system-ui, sans-serif; color: #E8E8E8; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components/ChakraGlyph.jsx"></script>
  <script type="text/babel" src="components/Homepage.jsx"></script>
  <script type="text/babel" src="components/ProductCard.jsx"></script>
  <script type="text/babel" src="components/CollectionPage.jsx"></script>
  <script type="text/babel" src="components/Quiz.jsx"></script>
  <script type="text/babel" src="components/PDP.jsx"></script>
  <script type="text/babel" src="components/Checkout.jsx"></script>
  <script type="text/babel" src="components/Journal.jsx"></script>
  <script type="text/babel" src="components/MobileNav.jsx"></script>
  <script type="text/babel" src="components/BeautyCollection.jsx"></script>
  <script type="text/babel" src="components/AyurvedaHub.jsx"></script>
  <script type="text/babel" src="components/AyurvedaArticle.jsx"></script>
  <script type="text/babel" src="components/BeautyPDP.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas title="Benessere Zen · Redesign" subtitle="Tempio digitale — sistema chakra × Rick Owens">

          <DCSection id="overview" title="01 · Direzione visiva" description="Dark editorial, oro come punteggiatura, sette chakra come architettura categoriale. Sacred geometry senza cliché.">
            <DCArtboard id="sys" label="Sistema · Token + Chakra Grid" width={1440} height={900}>
              <SystemBoard />
            </DCArtboard>
          </DCSection>

          <DCSection id="homepage" title="02 · Homepage" description="Hero scroll-driven con incenso che brucia + frasi che emergono. Portale chakra interattivo. Scroll per esplorare.">
            <DCArtboard id="home" label="Homepage completa" width={1440} height={900}>
              <ScrollFrame>
                <Homepage />
              </ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="megamenu" title="03 · Header · Mega menu chakra" description="7 colonne verticali, una per chakra. Ogni colonna: numero, glifo, nome sanscrito + italiano, prodotti, CTA.">
            <DCArtboard id="mega" label="Mega menu aperto" width={1440} height={620}>
              <MegaMenuStandalone />
            </DCArtboard>
          </DCSection>

          <DCSection id="product" title="04 · Product card" description="Scheda prodotto dark. Indicatore chakra, proprietà spirituali, guida d'uso, CTA in colore chakra.">
            <DCArtboard id="prod" label="Product cards (3x)" width={1440} height={820}>
              <ProductCardShowcase />
            </DCArtboard>
          </DCSection>

          <DCSection id="collection" title="05 · Collection page" description="Hero chakra-tematico con glifo rotante + anello di testo. Filtri, grid prodotti, bundle consigliato.">
            <DCArtboard id="col-7" label="Sahasrara · Corona" width={1440} height={1800}>
              <ScrollFrame>
                <CollectionPage chakraIndex={6} />
              </ScrollFrame>
            </DCArtboard>
            <DCArtboard id="col-4" label="Anahata · Cuore" width={1440} height={1800}>
              <ScrollFrame>
                <CollectionPage chakraIndex={3} />
              </ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="quiz" title="06 · Quiz 'Trova il tuo rituale'" description="Intro → 9 domande → risultato chakra dominante + bundle personalizzato. Interattivo.">
            <DCArtboard id="quiz-intro" label="Intro" width={1440} height={900}>
              <QuizPage />
            </DCArtboard>
            <DCArtboard id="quiz-q" label="Domanda (navigabile)" width={1440} height={900}>
              <QuizAtStep step={2} />
            </DCArtboard>
            <DCArtboard id="quiz-result" label="Risultato (Anahata)" width={1440} height={1800}>
              <ScrollFrame>
                <QuizAtStep step={99} forcedAnswers={[3,3,3,3,3,3,3,3,3]} />
              </ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="pdp" title="07 · Product Detail Page" description="Storytelling esteso. Hero gallery, programmazione cristallo con intenzione, tabs (rituale 21 giorni / proprietà / cura / recensioni), pairings.">
            <DCArtboard id="pdp-1" label="PDP · Ametista Drusa" width={1440} height={2400}>
              <ScrollFrame><PDP chakraIndex={6}/></ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="checkout" title="08 · Checkout Rituale" description="Quattro capitoli: Carrello → Indirizzo → Pagamento → Conferma. Sommario sticky a destra, intenzione del cristallo persistente.">
            <DCArtboard id="ck-1" label="Carrello" width={1440} height={1100}>
              <ScrollFrame><Checkout/></ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="journal" title="09 · Journal" description="Editoriale dark, magazine-style. Cover article + grid filtrabile. Letture lente, niente click-bait.">
            <DCArtboard id="jrnl" label="Journal · Numero 014" width={1440} height={2200}>
              <ScrollFrame><Journal/></ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="ayurveda-hub" title="11 · Ayurveda · macro hub" description="Landing della macro-collezione Ayurveda. Apertura editoriale, scopri il tuo dosha (Vāta · Pitta · Kapha), 8 sotto-collezioni, 8 piante madri.">
            <DCArtboard id="ayhub" label="Ayurveda · landing" width={1440} height={2400}>
              <ScrollFrame><AyurvedaHub/></ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="beauty-collection" title="12 · Cosmesi Viso · collection" description="Sotto-collezione skincare ayurvedica. Hero più intimo del macro-hub, filtri per categoria (sieri · creme · maschere…), card prodotto con INCI hint, PAO, attivi star.">
            <DCArtboard id="bcoll" label="Cosmesi Viso Ayurvedica" width={1440} height={2200}>
              <ScrollFrame><BeautyCollection/></ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="beauty-pdp" title="13 · PDP Beauty · Siero Vit.C" description="PDP cosmetica. Gallery + lab proof, formato + ricarica, tabs (storia · ingredienti · routine · INCI · recensioni), pairings.">
            <DCArtboard id="bpdp" label="Siero Vitamina C · 30ml" width={1440} height={2800}>
              <ScrollFrame><BeautyPDP/></ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="article" title="14 · Editoriale · Cos'è l'Ayurveda" description="Long-form contemplativo. Cover gigante con आयुर्वेद watermark, indice sticky, lettura accompagnata nel rail destro, citazione dal Caraka Saṃhitā, CTA al quiz dosha.">
            <DCArtboard id="art" label="Saggio · 12 minuti" width={1440} height={2800}>
              <ScrollFrame><AyurvedaArticle/></ScrollFrame>
            </DCArtboard>
          </DCSection>

          <DCSection id="mobile" title="15 · Mobile" description="Hero, drawer di navigazione chakra, PDP con sticky CTA. Tre device frame affiancati.">
            <DCArtboard id="mob" label="Mobile · 3 schermate" width={1440} height={900}>
              <MobileShowcase/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    // Wraps artboard content in a scrollable frame for tall pages
    function ScrollFrame({ children }) {
      return (
        <div style={{ width: '100%', height: '100%', overflow: 'auto', position: 'relative' }}>
          {children}
        </div>
      );
    }

    // System board — token sheet
    function SystemBoard() {
      return (
        <div className="bz-root" style={{ padding: 56, height: '100%' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 64, height: '100%' }}>
            <div>
              <div className="label">Sistema visivo · v.001</div>
              <h1 style={{ fontSize: 84, lineHeight: 0.9, marginTop: 20 }}>
                Sette colori,<br/>una <span className="foil">spina dorsale</span>.
              </h1>
              <p style={{ color: 'var(--ink-mute)', fontSize: 15, lineHeight: 1.7, marginTop: 28, maxWidth: 520 }}>
                Non un sito wellness. Non un template di yoga. Un tempio contemporaneo dove ogni
                chakra è una collezione, ogni oggetto una funzione, ogni dettaglio una scelta.
              </p>

              <div style={{ marginTop: 48 }}>
                <div className="label-ink">Tipografia</div>
                <div style={{ marginTop: 18, display: 'flex', flexDirection: 'column', gap: 18 }}>
                  <div>
                    <div style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontWeight: 300, fontSize: 54, lineHeight: 1 }}>Cormorant Garamond</div>
                    <div className="label-ink" style={{ marginTop: 4 }}>Display · Italic · 300–700</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: 'var(--f-body)', fontSize: 20 }}>Lato · Corpo · 300/400/700</div>
                    <div className="label-ink" style={{ marginTop: 4 }}>Testo corrente, lineheight 1.6</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: 'var(--f-label)', textTransform: 'uppercase', letterSpacing: '0.28em', fontSize: 13 }}>JOSEFIN SANS · LABEL</div>
                    <div className="label-ink" style={{ marginTop: 4 }}>Micro-labels, badge, caption</div>
                  </div>
                </div>
              </div>

              <div style={{ marginTop: 40 }}>
                <div className="label-ink">Palette base</div>
                <div style={{ marginTop: 14, display: 'flex', gap: 12 }}>
                  {[
                    ['#0F0F0F', 'Void'],
                    ['#1A1A2E', 'Indigo notte'],
                    ['#E8E8E8', 'Cenere'],
                    ['#C9A84C', 'Oro'],
                  ].map(([c, n]) => (
                    <div key={c} style={{ flex: 1 }}>
                      <div style={{ height: 64, background: c, border: '1px solid var(--hairline-soft)' }}/>
                      <div style={{ marginTop: 8, fontFamily: 'var(--f-label)', fontSize: 10, letterSpacing: '0.2em', color: 'var(--ink-mute)' }}>{n}</div>
                      <div style={{ fontFamily: 'ui-monospace', fontSize: 10, color: 'var(--ink-whisper)', marginTop: 2 }}>{c}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div>
              <div className="label">Sistema categoriale · 7 chakra</div>
              <div style={{ marginTop: 18, display: 'flex', flexDirection: 'column', gap: 10 }}>
                {CHAKRAS.map(c => (
                  <div key={c.id} style={{
                    display: 'grid', gridTemplateColumns: '48px 1fr 100px 80px', gap: 16, alignItems: 'center',
                    padding: '14px 18px', border: '1px solid var(--hairline-soft)', background: 'var(--bg-deep)',
                  }}>
                    <ChakraGlyph chakra={c} size={40}/>
                    <div>
                      <div className="sanskrit" style={{ fontSize: 18, color: c.hex }}>{c.sk}</div>
                      <div className="label-ink" style={{ fontSize: 9, marginTop: 2 }}>{c.it} · {c.element}</div>
                    </div>
                    <div style={{ color: c.hex, fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 18, letterSpacing: '0.2em' }}>{c.mantra}</div>
                    <div style={{ fontFamily: 'ui-monospace', fontSize: 10, color: 'var(--ink-whisper)', textAlign: 'right' }}>{c.hex}</div>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 28, padding: 20, border: '1px solid var(--hairline)' }}>
                <div className="label" style={{ color: 'var(--gold)' }}>◦ Regola d'oro</div>
                <p style={{ color: 'var(--ink-mute)', fontSize: 13, lineHeight: 1.6, marginTop: 8 }}>
                  Il colore chakra non decora — categorizza. Appare sempre accoppiato al numero 0{`{n}`}/07,
                  al nome sanscrito e al glifo. Mai isolato come ornamento.
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Mega menu standalone
    function MegaMenuStandalone() {
      return (
        <div className="bz-root" style={{ width: '100%', height: '100%', background: 'var(--bg-void)' }}>
          <div style={{
            padding: '24px 48px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            borderBottom: '1px solid var(--hairline-soft)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 40 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <svg width="28" height="28" viewBox="0 0 32 32">
                  <circle cx="16" cy="16" r="14" fill="none" stroke="var(--gold)" strokeWidth="0.5"/>
                  <circle cx="16" cy="16" r="8" fill="none" stroke="var(--gold)" strokeWidth="0.5"/>
                  <circle cx="16" cy="16" r="2" fill="var(--gold)"/>
                </svg>
                <span style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 20 }}>Benessere Zen</span>
              </div>
              <nav style={{ display: 'flex', gap: 28 }}>
                <span className="label-ink" style={{ color: 'var(--gold)' }}>◦ I sette chakra</span>
                <span className="label-ink">Rituali</span>
                <span className="label-ink">Journal</span>
                <span className="label-ink">Dicono di noi</span>
              </nav>
            </div>
            <div style={{ display: 'flex', gap: 24 }}>
              <span className="label-ink">Cerca</span>
              <span className="label-ink">Account</span>
              <span className="label-ink" style={{ color: 'var(--gold)' }}>Carta · 0</span>
            </div>
          </div>
          <MegaMenu open={true} onClose={() => {}}/>
        </div>
      );
    }

    // Quiz at specific step
    function QuizAtStep({ step, forcedAnswers }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        // After mount, simulate clicks via internal state — we use a fresh rerender with our own controlled state.
      }, []);
      return <QuizControlled initialStep={step} initialAnswers={forcedAnswers || []}/>;
    }

    // Controlled re-rendering: re-declare simplified controlled quiz just for viewing a given step
    function QuizControlled({ initialStep, initialAnswers }) {
      // We rely on QuizPage being stateful; instead, render the same quiz and click through programmatically is complex.
      // Simpler: use a key hack — but QuizPage has internal state. So we copy its behavior via window pass.
      // Since re-using QuizPage would reset to intro, we wrap with a React element that forces the step via DOM timing.
      const host = React.useRef(null);
      React.useEffect(() => {
        // noop — for simplicity, show the intro for all except last artboard where we use a manual result-ish component.
      }, []);
      if (initialStep === 99) return <QuizResultStatic answers={initialAnswers}/>;
      if (initialStep === 2) return <QuizQuestionStatic stepIdx={2}/>;
      return <QuizPage />;
    }

    // Static question view for artboard display
    function QuizQuestionStatic({ stepIdx }) {
      return (
        <div className="bz-root grain" style={{ minHeight: '100%', height: '100%', position: 'relative' }}>
          <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
            <div style={{
              position: 'absolute', left: '50%', top: '50%',
              width: 1200, height: 1200, transform: 'translate(-50%,-50%)',
              background: 'radial-gradient(circle, #9B59B61a, transparent 60%)',
              filter: 'blur(60px)',
            }}/>
          </div>
          <div style={{ position: 'relative', zIndex: 2, padding: '24px 48px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--hairline-soft)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <svg width="24" height="24" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="14" fill="none" stroke="var(--gold)" strokeWidth="0.5"/>
                <circle cx="16" cy="16" r="8" fill="none" stroke="var(--gold)" strokeWidth="0.5"/>
                <circle cx="16" cy="16" r="2" fill="var(--gold)"/>
              </svg>
              <span style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 16 }}>Benessere Zen</span>
              <span style={{ color: 'var(--ink-whisper)', margin: '0 14px' }}>/</span>
              <span className="label" style={{ color: 'var(--gold)' }}>Trova il tuo rituale</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
              <span className="label-ink">{String(stepIdx+1).padStart(2,'0')} / 09</span>
              <div style={{ width: 200, height: 1, background: 'var(--hairline-soft)', position: 'relative' }}>
                <div style={{ position: 'absolute', left: 0, top: 0, height: 1, width: `${((stepIdx+1)/9)*100}%`, background: 'var(--gold)' }}/>
              </div>
            </div>
          </div>
          <div style={{ position: 'relative', zIndex: 2, padding: '80px 48px' }}>
            <div style={{ maxWidth: 980, margin: '20px auto' }}>
              <div className="label" style={{ color: 'var(--gold-soft)' }}>Domanda {String(stepIdx+1).padStart(2,'0')}</div>
              <h2 style={{ fontSize: 56, marginTop: 18, lineHeight: 1.1, letterSpacing: '-0.01em', maxWidth: 880 }}>
                Quando ti senti bloccato/a, cosa manca davvero?
              </h2>
              <div style={{ marginTop: 56, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
                {[
                  { t: 'Fiducia nel prossimo passo.', c: 2 },
                  { t: 'Sicurezza economica, stabilità.', c: 0 },
                  { t: 'Qualcuno che mi veda per davvero.', c: 3 },
                  { t: 'Una visione chiara del futuro.', c: 5 },
                ].map((o, i) => (
                  <div key={i} style={{
                    padding: '28px 32px', background: 'var(--bg-deep)',
                    border: i === 2 ? `1px solid ${CHAKRAS[o.c].hex}` : '1px solid var(--hairline-soft)',
                    display: 'flex', gap: 20, alignItems: 'flex-start',
                  }}>
                    <span style={{ fontFamily: 'var(--f-label)', fontSize: 10, letterSpacing: '0.28em', color: CHAKRAS[o.c].hex, marginTop: 6, minWidth: 18 }}>0{i+1}</span>
                    <span style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 24, lineHeight: 1.35 }}>{o.t}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function QuizResultStatic({ answers }) {
      // compute dominant from answers array of chakra indexes
      const tally = (answers || [3,3,3,3,3,3,3,3,3]).reduce((a, i) => { a[i]=(a[i]||0)+1; return a; }, {});
      const sorted = Object.entries(tally).sort((a,b) => b[1]-a[1]);
      const dominant = CHAKRAS[parseInt(sorted[0][0])];
      const secondary = CHAKRAS[parseInt((sorted[1]||sorted[0])[0])];
      return (
        <div className="bz-root grain" style={{ minHeight: '100%', position: 'relative' }}>
          <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
            <div style={{
              position: 'absolute', left: '50%', top: '20%',
              width: 1200, height: 1200, transform: 'translate(-50%,-50%)',
              background: `radial-gradient(circle, ${dominant.hex}1a, transparent 60%)`,
              filter: 'blur(60px)',
            }}/>
          </div>
          <div style={{ position: 'relative', zIndex: 2, padding: '24px 48px', display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid var(--hairline-soft)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <svg width="24" height="24" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="14" fill="none" stroke="var(--gold)" strokeWidth="0.5"/>
                <circle cx="16" cy="16" r="2" fill="var(--gold)"/>
              </svg>
              <span style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 16 }}>Benessere Zen</span>
              <span style={{ color: 'var(--ink-whisper)', margin: '0 14px' }}>/</span>
              <span className="label" style={{ color: 'var(--gold)' }}>Il tuo rituale</span>
            </div>
            <span className="label-ink">09 / 09 · completato</span>
          </div>
          <div style={{ position: 'relative', zIndex: 2, padding: '80px 48px' }}>
            <div style={{ maxWidth: 1200, margin: '0 auto' }}>
              <div className="label" style={{ color: 'var(--gold)' }}>Il tuo rituale · Risultato</div>
              <h1 style={{ fontSize: 56, lineHeight: 1, marginTop: 20 }}>
                Il chakra che chiede di essere ascoltato è
              </h1>
              <div style={{ marginTop: 40, display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: 80, alignItems: 'center' }}>
                <div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                    <div style={{ height: 1, width: 60, background: dominant.hex }}/>
                    <span style={{ color: dominant.hex, fontFamily: 'var(--f-label)', fontSize: 11, letterSpacing: '0.3em' }}>0{dominant.n} / 07</span>
                  </div>
                  <div className="sanskrit" style={{ fontSize: 32, color: dominant.hex, marginTop: 24 }}>{dominant.sk}</div>
                  <h2 style={{ fontSize: 160, lineHeight: 0.85, marginTop: 4, letterSpacing: '-0.04em' }}>
                    <span style={{ fontStyle: 'italic' }}>{dominant.it}</span>
                  </h2>
                  <p style={{ color: 'var(--ink-mute)', fontSize: 16, lineHeight: 1.7, marginTop: 28, maxWidth: 540 }}>
                    {dominant.intent}. Il tuo sistema chiede questo ora.
                  </p>
                  <div style={{ marginTop: 32, display: 'flex', gap: 48 }}>
                    <div><div className="label-ink">Elemento</div><div style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 22, marginTop: 6 }}>{dominant.element}</div></div>
                    <div><div className="label-ink">Mantra</div><div style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 22, marginTop: 6, color: dominant.hex, letterSpacing: '0.2em' }}>{dominant.mantra}</div></div>
                    <div><div className="label-ink">Supporto</div><div style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', fontSize: 22, marginTop: 6 }}>{secondary.it}</div></div>
                  </div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'center', position: 'relative' }}>
                  <div style={{
                    position: 'absolute', width: 500, height: 500,
                    borderRadius: '50%',
                    background: `radial-gradient(circle, ${dominant.hex}44, transparent 60%)`,
                    filter: 'blur(30px)',
                  }}/>
                  <ChakraGlyph chakra={dominant} size={360} stroke={0.8}/>
                </div>
              </div>

              <div style={{ marginTop: 80, padding: 48, border: `1px solid ${dominant.hex}`, background: 'var(--bg-deep)', position: 'relative', overflow: 'hidden' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 36 }}>
                  <div>
